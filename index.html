<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeachNwrite - CMS with Google Sheets</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(to bottom, #bfdbfe 0%, #e0f2fe 25%, #fdf2f8 60%, #fce7f3 100%);
            min-height: 100vh;
        }
        
        .font-kristen {
            font-family: "Kristen ITC", "Comic Sans MS", "Comic Neue", cursive;
            font-weight: 800;
        }

        .text-dark-purple { color: #4c1d95; }

        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(100, 116, 139, 0.1);
        }
        
        .glass-nav-top {
            background: rgba(191, 219, 254, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.9);
        }

        .glass-nav-bottom {
            background: rgba(252, 231, 243, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.9);
        }

        .nav-link { color: #4c1d95; font-weight: 800; transition: all 0.3s ease; display: flex; align-items: center; gap: 0.5rem; }
        .nav-active { color: #4c1d95; border-bottom: 3px solid #4c1d95; }
        .mob-active { color: #4c1d95; }
        .mob-inactive { color: #64748b; }

        .hidden-section { display: none; }
        .animate-fade { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .floating-element {
            position: fixed; z-index: 0; pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* Loading spinner */
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #10b981;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Article card hover */
        .article-card {
            transition: all 0.3s ease;
        }
        .article-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* Form styling */
        .form-input {
            transition: all 0.2s ease;
        }
        .form-input:focus {
            outline: none;
            ring: 2px solid #3b82f6;
        }

        /* Password modal */
        .password-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
        }
        .password-modal-content {
            max-width: 400px;
            width: 90%;
        }
        .password-input {
            transition: all 0.3s ease;
        }
        .password-input:focus {
            outline: none;
            ring: 2px solid #3b82f6;
            border-color: transparent;
        }
        .shake {
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }
    </style>
</head>
<body class="text-gray-800 pb-24 md:pb-0 overflow-x-hidden">

    <!-- Elemen Dekoratif -->
    <div class="floating-element top-20 left-5 text-blue-500 opacity-50 hidden md:block" style="animation-delay: 0s;">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c-2.2 0-4 1.8-4 4 0 2.2 1.8 4 4 4s4-1.8 4-4c0-2.2-1.8-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM6.3 5.6c.1.1.3.1.4.1.3 0 .6-.2.7-.5.2-.4 0-.8-.4-1l-1.4-.5c-.4-.1-.8.1-1 .4-.1.4.1.8.5 1l1.2.5zm11.4 0l1.2-.5c.4-.1.6-.6.5-1-.1-.4-.6-.6-1-.4l-1.4.5c-.4.2-.6.6-.4 1 .1.3.4.5.7.5.1 0 .3 0 .4-.1zM5.6 17.7l-.5 1.4c-.1.4.1.8.5 1 .1 0 .2.1.3.1.3 0 .6-.2.7-.5l.5-1.4c.1-.4-.1-.8-.5-1-.5-.2-.9 0-1 .4zm12.8 0c-.1.4.1.8.5 1l.5 1.4c.1.3.4.5.7.5.1 0 .2 0 .3-.1.4-.1.6-.6.5-1l-.5-1.4c-.1-.4-.6-.6-1-.4-.4.2-.6.6-.5 1zM12 2c-.6 0-1 .4-1 1v1c0 .6.4 1 1 1s1-.4 1-1V3c0-.6-.4-1-1-1zm0 18c-.6 0-1 .4-1 1v1c0 .6.4 1 1 1s1-.4 1-1v-1c0-.6-.4-1-1-1z"/></svg>
    </div>
    <div class="floating-element top-1/3 right-10 text-indigo-500 opacity-40 hidden md:block" style="animation-delay: 1.5s;">
        <svg width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"></path></svg>
    </div>
    <div class="floating-element bottom-40 left-1/4 text-emerald-500 opacity-40 hidden md:block" style="animation-delay: 3s;">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"></path></svg>
    </div>
    <div class="floating-element bottom-20 right-1/4 text-pink-500 opacity-50 hidden md:block" style="animation-delay: 4.5s;">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c-2.2 0-4 1.8-4 4 0 2.2 1.8 4 4 4s4-1.8 4-4c0-2.2-1.8-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM6.3 5.6c.1.1.3.1.4.1.3 0 .6-.2.7-.5.2-.4 0-.8-.4-1l-1.4-.5c-.4-.1-.8.1-1 .4-.1.4.1.8.5 1l1.2.5zm11.4 0l1.2-.5c.4-.1.6-.6.5-1-.1-.4-.6-.6-1-.4l-1.4.5c-.4.2-.6.6-.4 1 .1.3.4.5.7.5.1 0 .3 0 .4-.1zM5.6 17.7l-.5 1.4c-.1.4.1.8.5 1 .1 0 .2.1.3.1.3 0 .6-.2.7-.5l.5-1.4c.1-.4-.1-.8-.5-1-.5-.2-.9 0-1 .4zm12.8 0c-.1.4.1.8.5 1l.5 1.4c.1.3.4.5.7.5.1 0 .2 0 .3-.1.4-.1.6-.6.5-1l-.5-1.4c-.1-.4-.6-.6-1-.4-.4.2-.6.6-.5 1zM12 2c-.6 0-1 .4-1 1v1c0 .6.4 1 1 1s1-.4 1-1V3c0-.6-.4-1-1-1zm0 18c-.6 0-1 .4-1 1v1c0 .6.4 1 1 1s1-.4 1-1v-1c0-.6-.4-1-1-1z"/></svg>
    </div>

    <!-- Navbar Desktop -->
    <nav class="glass-nav-top shadow-sm sticky top-0 z-50 hidden md:block">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-extrabold flex items-center gap-2">
                <span class="text-blue-700">teach</span><span class="text-red-500">N</span><span class="text-emerald-500">write</span>
                <svg class="w-6 h-6 text-blue-500" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c-2.2 0-4 1.8-4 4 0 2.2 1.8 4 4 4s4-1.8 4-4c0-2.2-1.8-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
            </h1>
            <div class="flex space-x-8 items-center">
                <button onclick="showSection('home')" class="nav-link font-kristen text-xl" id="nav-home">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Home
                </button>
                <button onclick="showSection('articles')" class="nav-link font-kristen text-xl" id="nav-articles">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"></path></svg>
                    Artikel
                </button>
                <button onclick="showSection('profile')" class="nav-link font-kristen text-xl" id="nav-profile">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"></path></svg>
                    Profile
                </button>
                <!-- Menu Tambah Artikel - Khusus Admin -->
                <button onclick="showAddArticle()" class="nav-link font-kristen text-xl text-emerald-600 hover:text-emerald-800" id="nav-add">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    + Artikel
                </button>
            </div>
        </div>
    </nav>

    <!-- Navbar Mobile -->
    <nav class="fixed bottom-0 left-0 right-0 glass-nav-bottom shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] md:hidden z-50">
        <div class="flex justify-around py-2">
            <button onclick="showSection('home')" class="flex flex-col items-center mob-inactive" id="mob-home">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="text-xs font-kristen">Home</span>
            </button>
            <button onclick="showSection('articles')" class="flex flex-col items-center mob-inactive" id="mob-articles">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"></path></svg>
                <span class="text-xs font-kristen">Artikel</span>
            </button>
            <button onclick="showSection('profile')" class="flex flex-col items-center mob-inactive" id="mob-profile">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"></path></svg>
                <span class="text-xs font-kristen">Profile</span>
            </button>
            <button onclick="showAddArticle()" class="flex flex-col items-center mob-inactive text-emerald-600" id="mob-add">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                <span class="text-xs font-kristen">+ Artikel</span>
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 md:px-6 py-8 relative z-10">
        
        <!-- HOME SECTION -->
        <section id="home" class="animate-fade">
            <div class="glass-card rounded-[2rem] overflow-hidden flex flex-col md:flex-row relative">
                <div class="p-8 md:w-1/2 flex flex-col justify-center text-dark-purple relative">
                    <h2 class="text-3xl md:text-5xl font-extrabold mb-4">Welcome to teachNwrite</h2>
                    <p class="text-slate-600 opacity-90 mb-6">A digital Platform for Teaching and Writing - Teaching Mind, Writing Worlds.</p>
                    <button onclick="showSection('articles')" class="bg-emerald-500 text-white font-bold py-3 px-6 rounded-full w-fit hover:bg-emerald-600 transition shadow-lg flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"></path></svg>
                        Jelajahi Artikel
                    </button>
                </div>
                <div class="md:w-1/2 p-4 flex justify-center items-center relative">
                    <img id="hero-image" src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=800&q=80" class="w-full h-64 md:h-80 object-cover rounded-3xl shadow-xl mix-blend-multiply opacity-90" alt="Guru Mengajar">
                </div>
            </div>
        </section>

        <!-- ARTICLES SECTION -->
        <section id="articles" class="hidden-section animate-fade">
            <h2 class="text-3xl font-kristen text-dark-purple mb-6 flex items-center gap-3">
                <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"></path></svg>
                Artikel Terbaru
            </h2>
            
            <!-- DAFTAR ARTIKEL -->
            <div id="articles-container" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="text-center text-gray-500 col-span-3 py-10">
                    <div class="spinner"></div>
                    <p>Memuat artikel...</p>
                </div>
            </div>
        </section>

        <!-- ADD ARTICLE SECTION (Khusus Admin) -->
        <section id="add-article-section" class="hidden-section animate-fade">
            <h2 class="text-3xl font-kristen text-dark-purple mb-6 flex items-center gap-3">
                <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Tambah Artikel Baru
            </h2>
            
            <div class="glass-card p-6 md:p-8 rounded-3xl">
                <form id="add-article-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Judul *</label>
                        <input type="text" id="article-title" required 
                               class="form-input w-full px-4 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Konten *</label>
                        <textarea id="article-content" rows="6" required 
                                  class="form-input w-full px-4 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Penulis *</label>
                        <input type="text" id="article-author" required 
                               class="form-input w-full px-4 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">URL Gambar (Opsional)</label>
                        <input type="url" id="article-image" 
                               placeholder="https://images.unsplash.com/photo-xxx" 
                               class="form-input w-full px-4 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                        <select id="article-status" 
                                class="form-input w-full px-4 py-2 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="published">Published</option>
                            <option value="draft">Draft</option>
                        </select>
                    </div>
                    <div class="flex gap-3">
                        <button type="submit" 
                                class="bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl hover:bg-emerald-700 transition shadow-lg flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                            Publikasikan Artikel
                        </button>
                        <button type="reset" 
                                class="bg-gray-300 text-gray-700 font-bold py-3 px-8 rounded-xl hover:bg-gray-400 transition">
                            Reset
                        </button>
                        <button type="button" onclick="showSection('articles')" 
                                class="bg-blue-600 text-white font-bold py-3 px-8 rounded-xl hover:bg-blue-700 transition">
                            Lihat Artikel
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <!-- PROFILE SECTION -->
        <section id="profile" class="hidden-section animate-fade">
            <h2 class="text-3xl font-kristen text-dark-purple mb-6 flex items-center gap-3">
                <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"></path></svg>
                Profil Guru
            </h2>
            <div id="profile-container" class="glass-card p-8 rounded-3xl flex flex-col md:flex-row items-center gap-8">
                <div class="text-center text-gray-500 w-full py-10">
                    <div class="spinner"></div>
                    <p>Memuat profil...</p>
                </div>
            </div>
        </section>

    </main>

    <!-- Password Modal -->
    <div id="password-modal" class="password-modal hidden">
        <div class="password-modal-content glass-card p-8 rounded-3xl relative">
            <button onclick="closePasswordModal()" 
                    class="absolute top-4 right-4 text-gray-500 hover:text-gray-700 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
            
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-3">
                    <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>

                    <input type="password" id="password-input" 
                           placeholder="Masukkan password..."

                           autofocus>
                    <div id="password-error" class="text-red-500 text-sm mt-1 hidden">❌ Password salah! Silakan coba lagi.</div>

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>

            </form>
        </div>
    </div>

    <script>
    // ==============================================
    // KONFIGURASI - GANTI URL DEPLOY LO DI SINI!
    // ==============================================
    const CONFIG = {
        // 🔥 GANTI URL INI dengan Web App URL dari Google Apps Script!
        API_URL: 'https://script.google.com/macros/s/AKfycbwMkbkEi-asq1LNjDh2jknIYih_aOs3ufr3hqHzb-t3h3RIgV7lQPmMrgGS3klX3qcA/exec',
        
        // Kalo true pake data contoh, kalo false pake API
        USE_DUMMY: false, // ← Ubah ke false untuk pakai API
        
        // Password admin
        ADMIN_PASSWORD: 'd4Rm@01'
    };

    // ==============================================
    // DATA DUMMY (Contoh) - Untuk fallback
    // ==============================================
    const DUMMY_DATA = {
        articles: [],
        profile: {}
    };

    // ==============================================
    // STATE - Menyimpan data terakhir
    // ==============================================
    let currentArticles = [];
    let currentProfile = null;
    let isAdminAuthenticated = false;

    // ==============================================
    // FUNGSI NAVIGASI
    // ==============================================
    function showSection(sectionName) {
        // Sembunyikan semua section
        document.querySelectorAll('.hidden-section').forEach(el => {
            el.classList.add('hidden-section');
            el.classList.remove('animate-fade');
        });
        
        // Tampilkan section yang dipilih
        const section = document.getElementById(sectionName);
        if (section) {
            section.classList.remove('hidden-section');
            section.classList.add('animate-fade');
            
            // Trigger animasi ulang
            section.style.animation = 'none';
            setTimeout(() => {
                section.style.animation = 'fadeIn 0.5s ease-in-out';
            }, 10);
        }
        
        // Update active state navbar desktop
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.remove('nav-active');
        });
        const navBtn = document.getElementById(`nav-${sectionName}`);
        if (navBtn) navBtn.classList.add('nav-active');
        
        // Update active state navbar mobile
        document.querySelectorAll('.mob-inactive, .mob-active').forEach(link => {
            link.classList.remove('mob-active');
            link.classList.add('mob-inactive');
        });
        const mobBtn = document.getElementById(`mob-${sectionName}`);
        if (mobBtn) {
            mobBtn.classList.remove('mob-inactive');
            mobBtn.classList.add('mob-active');
        }
    }

    // ==============================================
    // FUNGSI PASSWORD MODAL
    // ==============================================
    function showAddArticle() {
        if (isAdminAuthenticated) {
            // Langsung tampilkan form tambah artikel
            showSection('add-article-section');
            return;
        }
        
        // Tampilkan modal password
        const modal = document.getElementById('password-modal');
        modal.classList.remove('hidden');
        document.getElementById('password-input').value = '';
        document.getElementById('password-input').focus();
        document.getElementById('password-error').classList.add('hidden');
        document.getElementById('password-input').classList.remove('shake');
    }

    function closePasswordModal() {
        document.getElementById('password-modal').classList.add('hidden');
    }

    function verifyPassword(event) {
        event.preventDefault();
        
        const input = document.getElementById('password-input');
        const error = document.getElementById('password-error');
        const password = input.value.trim();
        
        if (password === CONFIG.ADMIN_PASSWORD) {
            isAdminAuthenticated = true;
            closePasswordModal();
            showSection('add-article-section');
            // Reset input
            input.value = '';
            error.classList.add('hidden');
        } else {
            // Tampilkan error dengan animasi shake
            error.classList.remove('hidden');
            input.classList.add('shake');
            setTimeout(() => {
                input.classList.remove('shake');
            }, 500);
            input.value = '';
            input.focus();
        }
    }

    // Close modal dengan tombol ESC
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closePasswordModal();
        }
    });

    // ==============================================
    // AMBIL DATA DARI API / DUMMY
    // ==============================================
    async function fetchData() {
        try {
            if (CONFIG.USE_DUMMY) {
                console.log('📦 Menggunakan data dummy...');
                return DUMMY_DATA;
            }
            
            console.log('🌐 Fetching data dari API:', CONFIG.API_URL);
            const response = await fetch(CONFIG.API_URL);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const result = await response.json();
            console.log('✅ Data berhasil diambil:', result);
            
            if (result.status === 'success') {
                // Simpan ke state
                if (result.data.articles) {
                    currentArticles = result.data.articles;
                }
                if (result.data.profile) {
                    currentProfile = result.data.profile;
                }
                return result.data;
            } else {
                throw new Error(result.message || 'Gagal mengambil data');
            }
            
        } catch (error) {
            console.error('❌ Error fetchData:', error);
            console.log('⚠️ Menggunakan data dari state sebelumnya');
            // Kembalikan data dari state kalo ada
            return {
                articles: currentArticles.length > 0 ? currentArticles : DUMMY_DATA.articles,
                profile: currentProfile || DUMMY_DATA.profile
            };
        }
    }

    // ==============================================
    // TAMBAH ARTIKEL VIA API
    // ==============================================
    async function addArticleToAPI(formData) {
        try {
            if (CONFIG.USE_DUMMY) {
                console.log('📦 Mode dummy: Artikel ditambahkan ke data dummy');
                const newArticle = {
                    id: Date.now(),
                    title: formData.title,
                    content: formData.content,
                    author: formData.author,
                    date: new Date().toISOString().split('T')[0],
                    image_url: formData.image_url || '',
                    status: formData.status || 'published'
                };
                // Tambahkan ke state
                currentArticles.unshift(newArticle);
                return { success: true, data: newArticle };
            }
            
            console.log('🌐 Menambahkan artikel ke API...');
            const response = await fetch(CONFIG.API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    action: 'addArticle',
                    title: formData.title,
                    content: formData.content,
                    author: formData.author,
                    image_url: formData.image_url || '',
                    status: formData.status || 'published'
                })
            });
            
            console.log('✅ Artikel berhasil ditambahkan!');
            return { success: true };
            
        } catch (error) {
            console.error('❌ Error add article:', error);
            return { success: false, error: error.message };
        }
    }

    // ==============================================
    // RENDER ARTIKEL
    // ==============================================
    function renderArticles(articles) {
        const container = document.getElementById('articles-container');
        
        // Simpan ke state
        if (articles) {
            currentArticles = articles;
        }
        
        const dataToRender = articles || currentArticles;
        
        if (!dataToRender || dataToRender.length === 0) {
            container.innerHTML = `
                <div class="text-center text-gray-500 col-span-3 py-10">
                    <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">

            `;
            return;
        }
        
        // Filter hanya yang statusnya published
        const publishedArticles = dataToRender.filter(a => 
            a.status && a.status.toLowerCase() === 'published'
        );
        
        if (publishedArticles.length === 0) {
            container.innerHTML = `
                <div class="text-center text-gray-500 col-span-3 py-10">
                    <p class="text-lg">Belum ada artikel yang dipublikasikan</p>
                </div>
            `;
            return;
        }
        
        // Render artikel
        let html = '';
        publishedArticles.forEach((article, index) => {
            // Truncate content
            const maxLength = 150;
            let content = article.content || '';
            if (content.length > maxLength) {
                content = content.substring(0, maxLength) + '...';
            }
            
            // Format date
            let date = article.date || '';
            if (date) {
                try {
                    const d = new Date(date);
                    date = d.toLocaleDateString('id-ID', {
                        day: 'numeric',
                        month: 'long',
                        year: 'numeric'
                    });
                } catch (e) {
                    // Biarin aja kalo error
                }
            }
            
            // Gunakan ID atau index sebagai fallback
            const articleId = article.id || index;
            
            html += `
                <div class="glass-card rounded-2xl overflow-hidden article-card">
                    <img src="${article.image_url || 'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=800&q=80'}" 
                         alt="${article.title}" 
                         class="w-full h-48 object-cover"
                         onerror="this.src='https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=800&q=80'">
                    <div class="p-6">
                        <div class="flex items-center gap-2 text-sm text-gray-500 mb-2 flex-wrap">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                            <span>${article.author || 'Anonymous'}</span>
                            <span class="w-1 h-1 bg-gray-300 rounded-full"></span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                            <span>${date || 'Tanggal tidak tersedia'}</span>
                        </div>
                        <h3 class="text-xl font-bold text-dark-purple mb-2 line-clamp-2">${article.title}</h3>
                        <p class="text-gray-600 text-sm line-clamp-3 mb-4">${content}</p>
                        <button onclick="showArticleDetail(${articleId})" 
                                class="text-emerald-600 font-semibold hover:text-emerald-700 transition flex items-center gap-1">
                            Baca Selengkapnya
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                        </button>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    // ==============================================
    // SHOW ARTICLE DETAIL (Popup/Modal)
    // ==============================================
    function showArticleDetail(articleId) {
        // Cari artikel dari state currentArticles
        let article = currentArticles.find(a => a.id === articleId);
        
        // Kalo gak ketemu, coba dari semua data (termasuk draft)
        if (!article) {
            article = DUMMY_DATA.articles.find(a => a.id === articleId);
        }
        
        if (!article) {
            alert('⚠️ Artikel tidak ditemukan!');
            console.log('Article ID:', articleId, 'Available articles:', currentArticles);
            return;
        }
        
        // Buat modal
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm';
        modal.id = 'article-modal';
        modal.onclick = function(e) {
            if (e.target === this) this.remove();
        };
        
        // Format date
        let date = article.date || '';
        if (date) {
            try {
                const d = new Date(date);
                date = d.toLocaleDateString('id-ID', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });
            } catch (e) {
                date = article.date || 'Tanggal tidak tersedia';
            }
        }
        
        modal.innerHTML = `
            <div class="glass-card max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6 md:p-8 rounded-3xl relative animate-fade">
                <button onclick="document.getElementById('article-modal').remove()"

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
                <img src="${article.image_url || 'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=800&q=80'}" 
                     alt="${article.title}" 
                     class="w-full h-56 object-cover rounded-2xl mb-4"
                     onerror="this.src='https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=800&q=80'">
                <div class="flex items-center gap-2 text-sm text-gray-500 mb-2 flex-wrap">
                    <span>✍️ ${article.author || 'Anonymous'}</span>
                    <span class="w-1 h-1 bg-gray-300 rounded-full"></span>

            </div>
        `;
        
        document.body.appendChild(modal);
    }

    // ==============================================
    // INIT - LOAD DATA SAAT HALAMAN DIMUAT
    // ==============================================
    async function init() {
        console.log('🚀 TeachNwrite CMS - Loading...');
        console.log(`📌 Mode: ${CONFIG.USE_DUMMY ? 'DUMMY' : 'API'}`);
        
        // Setup form submit untuk tambah artikel
        const form = document.getElementById('add-article-form');
        if (form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const formData = {
                    title: document.getElementById('article-title').value.trim(),
                    content: document.getElementById('article-content').value.trim(),
                    author: document.getElementById('article-author').value.trim(),
                    image_url: document.getElementById('article-image').value.trim(),
                    status: document.getElementById('article-status').value
                };
                
                // Validasi
                if (!formData.title || !formData.content || !formData.author) {
                    alert('⚠️ Mohon isi semua field yang wajib (Judul, Konten, Penulis)!');
                    return;
                }
                
                // Tampilkan loading
                const submitBtn = form.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = `
                    <svg class="w-5 h-5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    Menyimpan...
                `;
                submitBtn.disabled = true;
                
                // Kirim ke API
                const result = await addArticleToAPI(formData);
                
                // Reset button
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                
                if (result.success) {
